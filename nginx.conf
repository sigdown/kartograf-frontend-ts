server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /content/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}